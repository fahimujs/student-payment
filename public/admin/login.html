<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<nav class="navbar">
  <a href="/" class="brand">🎓 Student Pay</a>
  <a href="/">← Home</a>
</nav>

<div class="container-sm" style="margin-top:3rem;">
  <div class="card">
    <h2 style="margin-bottom:1.5rem; color:var(--primary); text-align:center;">🔐 Admin Login</h2>

    <div class="alert" id="alert-box"></div>

    <form id="login-form" novalidate>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" class="form-control" placeholder="admin@example.com" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" class="form-control" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="login-btn">Login</button>
    </form>
  </div>
</div>

<!-- Firebase Client SDK (CDN) -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC2CVm57dXE35XSogbX-YSGxIJy46KaA0c",
    authDomain: "student-verify.firebaseapp.com",
    projectId: "student-verify",
    storageBucket: "student-verify.firebasestorage.app",
    messagingSenderId: "165426055484",
    appId: "1:165426055484:web:0ac70c2cc1781995543639"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // If already logged in, redirect to dashboard
  onAuthStateChanged(auth, (user) => {
    if (user) window.location.href = '/admin/dashboard';
  });

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('login-btn');
    const alertBox = document.getElementById('alert-box');

    alertBox.className = 'alert';
    btn.disabled = true;
    btn.textContent = 'Logging in...';

    try {
      await signInWithEmailAndPassword(auth, email, password);
      window.location.href = '/admin/dashboard';
    } catch (err) {
      alertBox.className = 'alert alert-danger show';
      alertBox.textContent = '❌ ' + (err.code === 'auth/invalid-credential'
        ? 'Invalid email or password.'
        : err.message);
      btn.disabled = false;
      btn.textContent = 'Login';
    }
  });
</script>

</body>
</html>
