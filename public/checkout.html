<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout - Student Payment</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<nav class="navbar">
  <a href="/checkout" class="brand">🎓 Student Pay</a>
  <a href="/admin">Admin</a>
</nav>

<div class="spinner-overlay" id="spinner-overlay">
  <div class="spinner"></div>
  <p id="spinner-msg">Redirecting to payment...</p>
</div>

<div class="container-sm" style="margin-top:2rem;">
  <div class="card">
    <h2 style="margin-bottom:1.5rem; color:var(--primary);">💳 Payment Checkout</h2>
    <div class="alert" id="alert-box"></div>

    <form id="checkout-form" novalidate>
      <div class="form-group">
        <label for="name">Full Name *</label>
        <input type="text" id="name" class="form-control" placeholder="Enter your full name" required />
      </div>
      <div class="form-group">
        <label for="roll">Roll Number *</label>
        <input type="text" id="roll" class="form-control" placeholder="e.g. 2021-ET-001" required />
      </div>
      <div class="form-group">
        <label for="department">Department *</label>
        <select id="department" class="form-control" required>
          <option value="">-- Select Department --</option>
          <option value="ET">ET - Electronics Technology</option>
          <option value="CSE">CSE - Computer Science & Engineering</option>
          <option value="EEE">EEE - Electrical & Electronic Engineering</option>
          <option value="ECE">ECE - Electronics & Communication Engineering</option>
          <option value="ME">ME - Mechanical Engineering</option>
          <option value="CE">CE - Civil Engineering</option>
          <option value="TE">TE - Textile Engineering</option>
          <option value="BBA">BBA - Business Administration</option>
          <option value="English">English</option>
        </select>
      </div>
      <div class="form-group">
        <label for="amount">Amount (BDT) *</label>
        <input type="number" id="amount" class="form-control" value="500" min="1" required />
        <small style="color:var(--text-muted);">Default: 500 BDT। পরিবর্তন করতে পারবেন।</small>
      </div>
      <div class="form-group">
        <label for="payment-method">Payment Method *</label>
        <select id="payment-method" class="form-control">
          <option value="bkash">bKash</option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="pay-btn">
        🔒 Pay Now
      </button>
    </form>
  </div>
</div>

<!-- Developer Credit -->
<div style="text-align:center; padding: 2.5rem 1rem 1.5rem;">
  <p style="font-size:1.1rem; color:var(--text-muted); letter-spacing:0.5px;">
    Developed by
  </p>
  <p style="font-size:1.5rem; font-weight:700; color:var(--primary); margin-top:0.3rem;">
    Mohammad Shoriful Islam
  </p>
</div>

<script src="/js/main.js"></script>
<script>
  document.getElementById('checkout-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    hideAlert('alert-box');

    const name = document.getElementById('name').value.trim();
    const roll = document.getElementById('roll').value.trim();
    const department = document.getElementById('department').value;
    const amount = document.getElementById('amount').value;

    if (!name || !roll || !department || !amount) {
      showAlert('alert-box', '⚠️ সব ঘর পূরণ করুন।', 'danger');
      return;
    }
    if (parseFloat(amount) <= 0) {
      showAlert('alert-box', '⚠️ Amount অবশ্যই 0 এর বেশি হতে হবে।', 'danger');
      return;
    }

    document.getElementById('pay-btn').disabled = true;
    showLoading('Payment তৈরি হচ্ছে...');

    try {
      const response = await fetch('/api/create-payment', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, roll, amount, department })
      });

      const data = await response.json();

      if (!response.ok || !data.payment_url) {
        throw new Error(data.error || 'Payment তৈরি করা যায়নি।');
      }

      window.location.href = data.payment_url;

    } catch (err) {
      hideLoading();
      document.getElementById('pay-btn').disabled = false;
      showAlert('alert-box', '❌ ' + err.message, 'danger');
    }
  });
</script>

</body>
</html>
